<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        #chat {
            width: 500px;
            margin: auto;
            height: 500px;
            overflow-y: scroll;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #4CAF50;
            color: white;
            margin-left: auto;
        }

        .ai {
            background: #e0e0e0;
        }

        #input-area {
            width: 500px;
            margin: 10px auto;
            display: flex;
        }

        input {
            flex: 1;
            height: 40px;
            padding: 5px;
        }

        button {
            width: 80px;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">AI聊天（Day7）</h2>

<div id="chat"></div>

<div id="input-area">
    <input id="msg" placeholder="输入内容">
    <button onclick="send()">发送</button>
</div>

<script>
const user_id = Math.random().toString(36).substring(2);

function addMessage(text, type) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    addMessage("你：" + msg, "user");

    fetch(`http://127.0.0.1:8000/chat?msg=${msg}&user_id=${user_id}`)
        .then(res => res.json())
        .then(data => {
            addMessage("AI：" + data.reply, "ai");
        });

    document.getElementById("msg").value = "";
}

// 回车发送
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>

</body>
</html>
